# Local Spark + HDFS lab stack:
# - 1 HDFS NameNode
# - 3 HDFS DataNodes
# - 1 one-shot HDFS bootstrap service
# - 1 Spark master
# - 4 Spark workers
# - 1 dedicated Spark History Server
services:
  namenode:
    image: bde2020/hadoop-namenode:latest
    container_name: namenode
    restart: always
    ports:
      - "${NAMENODE_UI_HOST_PORT:-9870}:9870"
      - "${NAMENODE_RPC_HOST_PORT:-9000}:9000"
    environment:
      - CLUSTER_NAME=hadoop-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - namenode_data:/hadoop/dfs/name
      - namenode-upload:/mnt/upload
    networks:
      - hadoop-net

  datanode1:
    image: bde2020/hadoop-datanode:latest
    container_name: datanode1
    restart: always
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - datanode1_data:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - hadoop-net

  datanode2:
    image: bde2020/hadoop-datanode:latest
    container_name: datanode2
    restart: always
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - datanode2_data:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - hadoop-net

  datanode3:
    image: bde2020/hadoop-datanode:latest
    container_name: datanode3
    restart: always
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - datanode3_data:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - hadoop-net

  hdfs-init:
    image: bde2020/hadoop-namenode:latest
    container_name: hdfs-init
    restart: "no"
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_URI=hdfs://namenode:9000
    volumes:
      - ../../shared/scripts/hdfs-init.sh:/hdfs-init.sh:ro
    entrypoint: ["/bin/bash", "/hdfs-init.sh"]
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - hadoop-net

  spark-master:
    build:
      context: ../../..
      dockerfile: docker/images/spark-master/Dockerfile
    container_name: spark-master
    restart: always
    ports:
      - "${SPARK_MASTER_UI_HOST_PORT:-18080}:8080"
      - "${SPARK_MASTER_RPC_HOST_PORT:-7077}:7077"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_HOME=/opt/spark
    volumes:
      - spark-master-upload:/mnt/upload
    networks:
      - hadoop-net
    depends_on:
      hdfs-init:
        condition: service_completed_successfully

  spark-history:
    build:
      context: ../../..
      dockerfile: docker/images/spark-history/Dockerfile
    container_name: spark-history
    restart: always
    ports:
      - "${SPARK_HISTORY_UI_HOST_PORT:-18081}:18081"
    environment:
      - SPARK_HISTORY_LOG_DIR=hdfs://namenode:9000/logs
      - SPARK_HISTORY_UI_PORT=18081
    volumes:
      - ../../shared/hadoop-conf/local-hdfs/core-site.xml:/opt/spark/conf/core-site.xml:ro
      - ../../shared/hadoop-conf/local-hdfs/hdfs-site.xml:/opt/spark/conf/hdfs-site.xml:ro
    networks:
      - hadoop-net
    depends_on:
      hdfs-init:
        condition: service_completed_successfully

  spark-worker1:
    build:
      context: ../../..
      dockerfile: docker/images/spark-worker/Dockerfile
    container_name: spark-worker1
    restart: always
    ports:
      - "${SPARK_WORKER1_UI_HOST_PORT:-18082}:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=3G
    depends_on:
      - spark-master
    networks:
      - hadoop-net

  spark-worker2:
    build:
      context: ../../..
      dockerfile: docker/images/spark-worker/Dockerfile
    container_name: spark-worker2
    restart: always
    ports:
      - "${SPARK_WORKER2_UI_HOST_PORT:-18083}:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=3G
    depends_on:
      - spark-master
    networks:
      - hadoop-net

  spark-worker3:
    build:
      context: ../../..
      dockerfile: docker/images/spark-worker/Dockerfile
    container_name: spark-worker3
    restart: always
    ports:
      - "${SPARK_WORKER3_UI_HOST_PORT:-18084}:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=3G
    depends_on:
      - spark-master
    networks:
      - hadoop-net

  spark-worker4:
    build:
      context: ../../..
      dockerfile: docker/images/spark-worker/Dockerfile
    container_name: spark-worker4
    restart: always
    ports:
      - "${SPARK_WORKER4_UI_HOST_PORT:-18085}:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=3G
    depends_on:
      - spark-master
    networks:
      - hadoop-net

volumes:
  namenode_data:
  namenode-upload:
  datanode1_data:
  datanode2_data:
  datanode3_data:
  spark-master-upload:

networks:
  hadoop-net:
