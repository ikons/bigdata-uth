# All spark-submit commands inside this stack talk to the standalone master
# exposed by the `spark-master` service on the shared Docker network.
spark.master spark://spark-master:7077

# Client mode keeps the driver in the container that launches spark-submit,
# which makes logs and debugging simpler for the lab.
spark.submit.deployMode client

# Enable event logging so the History Server can reconstruct completed jobs.
spark.eventLog.enabled true
spark.speculation false

# Both the running application and the History Server use the same HDFS path
# for Spark event logs. The `namenode` hostname is resolved by Docker Compose.
spark.eventLog.dir hdfs://namenode:9000/logs
spark.history.fs.logDirectory hdfs://namenode:9000/logs
spark.history.ui.port 8081
